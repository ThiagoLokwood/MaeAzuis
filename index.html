<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página em Manutenção - Thiago Silva</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 400px;
        }
        h1 { color: #333; }
        p { color: #666; margin-bottom: 30px; }
        .btn-whatsapp {
            background-color: #25d366;
            color: white;
            padding: 15px 25px;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            display: inline-block;
            transition: background 0.3s;
        }
        .btn-whatsapp:hover {
            background-color: #128c7e;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Ops! Página em atualização</h1>
        <p>Estamos organizando nossas ativações e gamificações para melhor atendê-lo. Por favor, entre em contato diretamente com o administrador.</p>
        
        <a href="https://wa.me/SEUNUMEROAQUI" target="_blank" class="btn-whatsapp">
            Falar no WhatsApp
        </a>
    </div>

</body>
</html>
